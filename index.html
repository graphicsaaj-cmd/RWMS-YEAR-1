<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Examination</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #login-section, #result-section { text-align: center; }
        .hidden { display: none; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); padding-bottom: 10px; margin-bottom: 20px; }
        #timer { font-size: 1.2rem; font-weight: bold; color: var(--danger); }
        
        .question-container { display: none; }
        .question-container.active { display: block; }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; }
        
        .options-list { list-style: none; padding: 0; }
        .option { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f0f0f0; }
        .option input { margin-right: 10px; }

        .text-input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        .navigation { margin-top: 30px; display: flex; justify-content: space-between; }
        button { padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-next { background: var(--accent); color: white; }
        .btn-prev { background: var(--secondary); color: white; }
        .btn-submit { background: var(--success); color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .review-item { border-bottom: 1px solid #eee; padding: 15px 0; text-align: left; }
        .correct-ans { color: var(--success); font-weight: bold; }
        .user-ans { font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>Royal Wunderkind Model School</h1>
        <h2>Subject: English Language | Year 1</h2>
        <p>Please enter your full name to begin the assessment.</p>
        <input type="text" id="candidate-name" placeholder="Full Name" style="padding:10px; width:250px; margin-bottom:20px;"><br>
        <button class="btn-next" onclick="startExam()">Start Examination</button>
    </div>

    <div id="exam-section" class="hidden">
        <header>
            <div id="display-name">Candidate: </div>
            <div id="timer">Time Remaining: 45:00</div>
        </header>

        <div id="questions-wrapper">
            </div>

        <div class="navigation">
            <button id="prev-btn" class="btn-prev" onclick="changeQuestion(-1)">Previous</button>
            <button id="next-btn" class="btn-next" onclick="changeQuestion(1)">Next</button>
            <button id="submit-btn" class="btn-submit hidden" onclick="endExam()">Submit Exam</button>
        </div>
    </div>

    <div id="result-section" class="hidden">
        <h2>Examination Result</h2>
        <h3 id="final-score"></h3>
        <hr>
        <div id="answer-review"></div>
        <button class="btn-next" style="margin-top:20px;" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    const questions = [
        // Objectives
        { q: "A lion is a __________ animal.", type: "mcq", options: ["wild", "weak", "small"], correct: "wild" },
        { q: "Lagos is a big __________.", type: "mcq", options: ["farm", "city", "village"], correct: "city" },
        { q: "Goats are __________ animals.", type: "mcq", options: ["quiet", "naughty", "slow"], correct: "naughty" },
        { q: "Sharon is a __________ girl.", type: "mcq", options: ["good", "bad", "tall"], correct: "good" },
        { q: "John is a __________ boy.", type: "mcq", options: ["fine", "short", "dirty"], correct: "fine" },
        { q: "We begin every sentence with a __________ letter.", type: "mcq", options: ["small", "capital", "tiny"], correct: "capital" },
        { q: "A full stop is used at the __________ of a sentence.", type: "mcq", options: ["beginning", "middle", "end"], correct: "end" },
        { q: "My father is a __________.", type: "mcq", options: ["teacher", "goat", "child"], correct: "teacher" },
        { q: "Nigeria is a _________.", type: "mcq", options: ["city", "country", "house"], correct: "country" },
        { q: "Please __________ in.", type: "mcq", options: ["come", "eat", "sleep"], correct: "come" },
        { q: "The troll lived under the __________.", type: "mcq", options: ["tree", "bridge", "house"], correct: "bridge" },
        { q: "There __________ three billy goats.", type: "mcq", options: ["was", "were", "is"], correct: "were" },
        { q: "The goats wanted to become _________.", type: "mcq", options: ["fat", "thin", "weak"], correct: "fat" },
        { q: "The troll __________ loudly.", type: "mcq", options: ["roared", "cried", "laughed"], correct: "roared" },
        { q: "The goat used a __________ to fight the troll.", type: "mcq", options: ["horns", "rope", "basket"], correct: "horns" },
        { q: "Obi eats a __________ every day.", type: "mcq", options: ["banana", "rice", "yam"], correct: "banana" },
        { q: "Chidi fell off his _________.", type: "mcq", options: ["bicycle", "car", "chair"], correct: "bicycle" },
        { q: "The driver drove __________.", type: "mcq", options: ["slow", "fast", "late"], correct: "fast" },
        { q: "Jummai likes jollof__________ a lot.", type: "mcq", options: ["rice", "meat", "fish"], correct: "rice" },
        { q: "Our best subject is __________.", type: "mcq", options: ["English", "chair", "bag"], correct: "English" },
        { q: "The teacher is __________ on the board.", type: "mcq", options: ["writing", "sleeping", "eating"], correct: "writing" },
        { q: "The children are __________ on the playground.", type: "mcq", options: ["playing", "reading", "cooking"], correct: "playing" },
        { q: "Granny is __________ on the bed.", type: "mcq", options: ["sleeping", "running", "shouting"], correct: "sleeping" },
        { q: "The girls are __________ there books.", type: "mcq", options: ["running", "eating", "reading"], correct: "reading" },
        { q: "The trader is __________ oranges.", type: "mcq", options: ["selling", "washing", "cooking"], correct: "selling" },
        { q: "A friend is also called a __________.", type: "mcq", options: ["pal", "enemy", "stranger"], correct: "pal" },
        { q: "The word 'small' also means __________.", type: "mcq", options: ["tiny", "large", "long"], correct: "tiny" },
        { q: "The word 'fast' also means __________.", type: "mcq", options: ["quick", "slow", "weak"], correct: "quick" },
        { q: "The word 'shut' also means __________.", type: "mcq", options: ["close", "open", "jump"], correct: "close" },
        { q: "The word 'happy' also means __________.", type: "mcq", options: ["glad", "sad", "angry"], correct: "glad" },
        
        // Verbal Reasoning - Kk
        { q: "Choose word starting with Kk: Canoe, Cane, Kitten, Chicken", type: "mcq", options: ["Canoe", "Cane", "Kitten", "Chicken"], correct: "Kitten" },
        { q: "Choose word starting with Kk: Club, Kettle, Cow, Come", type: "mcq", options: ["Club", "Kettle", "Cow", "Come"], correct: "Kettle" },
        { q: "Choose word starting with Kk: Comb, Clean, Job, Kite", type: "mcq", options: ["Comb", "Clean", "Job", "Kite"], correct: "Kite" },
        { q: "Choose word starting with Kk: Nest, Farm, Kangaroo, House", type: "mcq", options: ["Nest", "Farm", "Kangaroo", "House"], correct: "Kangaroo" },
        { q: "Choose word starting with Kk: Kennel, Fish, Bat, cat", type: "mcq", options: ["Kennel", "Fish", "Bat", "cat"], correct: "Kennel" },

        // Fill in letters
        { q: "Complete with f, g, h, i, or j: ___ air", type: "text", correct: "f" },
        { q: "Complete with f, g, h, i, or j: ___ ather", type: "text", correct: "f" },
        { q: "Complete with f, g, h, i, or j: ___ oy", type: "text", correct: "j" },
        { q: "Complete with f, g, h, i, or j: Bu___", type: "text", correct: "g" },
        { q: "Complete with f, g, h, i, or j: ___ oat", type: "text", correct: "g" }
    ];

    let currentIdx = 0;
    let time = 45 * 60;
    let timerInterval;
    let userAnswers = {};

    function startExam() {
        const name = document.getElementById('candidate-name').value;
        if (!name) return alert("Please enter your name");
        
        document.getElementById('display-name').innerText = "Candidate: " + name;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('exam-section').classList.remove('hidden');
        
        renderQuestions();
        startTimer();
    }

    function renderQuestions() {
        const wrapper = document.getElementById('questions-wrapper');
        questions.forEach((quest, index) => {
            const div = document.createElement('div');
            div.className = `question-container ${index === 0 ? 'active' : ''}`;
            div.id = `q-${index}`;
            
            let html = `<div class="question-text">Question ${index + 1}: ${quest.q}</div>`;
            
            if (quest.type === 'mcq') {
                html += `<div class="options-list">`;
                quest.options.forEach(opt => {
                    html += `
                        <label class="option">
                            <input type="radio" name="answer-${index}" value="${opt}" onchange="saveAnswer(${index}, '${opt}')">
                            ${opt}
                        </label>`;
                });
                html += `</div>`;
            } else {
                html += `<input type="text" class="text-input" placeholder="Type your answer here..." oninput="saveAnswer(${index}, this.value)">`;
            }
            
            div.innerHTML = html;
            wrapper.appendChild(div);
        });
        updateNav();
    }

    function saveAnswer(idx, val) {
        userAnswers[idx] = val.trim().toLowerCase();
    }

    function changeQuestion(step) {
        document.getElementById(`q-${currentIdx}`).classList.remove('active');
        currentIdx += step;
        document.getElementById(`q-${currentIdx}`).classList.add('active');
        updateNav();
    }

    function updateNav() {
        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        const isLast = currentIdx === questions.length - 1;
        document.getElementById('next-btn').classList.toggle('hidden', isLast);
        document.getElementById('submit-btn').classList.toggle('hidden', !isLast);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            time--;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            document.getElementById('timer').innerText = `Time Remaining: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (time <= 0) endExam();
        }, 1000);
    }

    function endExam() {
        clearInterval(timerInterval);
        let score = 0;
        let reviewHtml = '';

        questions.forEach((q, idx) => {
            const userAns = userAnswers[idx] || "No answer";
            const isCorrect = userAns === q.correct.toLowerCase();
            if (isCorrect) score++;

            reviewHtml += `
                <div class="review-item">
                    <strong>Q${idx + 1}:</strong> ${q.q}<br>
                    <span class="user-ans">Your Answer: ${userAns}</span><br>
                    <span class="correct-ans">Correct Answer: ${q.correct}</span>
                </div>`;
        });

        document.getElementById('exam-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `You scored ${score} out of ${questions.length}`;
        document.getElementById('answer-review').innerHTML = reviewHtml;
    }
</script>

</body>
</html>

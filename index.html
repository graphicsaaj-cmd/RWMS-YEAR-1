<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROYAL WUNDERKIND MODEL SCHOOL - TERM TWO EXAM 2025/2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.6;
      background: #f9f9f9;
    }
    h1, h2 { text-align: center; color: #2c3e50; }
    .header { margin-bottom: 30px; }
    .timer {
      font-size: 1.4em;
      font-weight: bold;
      color: #d32f2f;
      text-align: center;
      margin: 20px 0;
      padding: 12px;
      background: #ffebee;
      border-radius: 8px;
    }
    .question {
      margin: 25px 0;
      padding: 18px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }
    .question h3 { margin-top: 0; color: #34495e; }
    label {
      display: block;
      margin: 10px 0;
      cursor: pointer;
    }
    input[type="radio"] { margin-right: 10px; }
    button {
      display: block;
      margin: 40px auto;
      padding: 14px 40px;
      font-size: 1.2em;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #219653; }
    #result {
      display: none;
      margin-top: 40px;
      padding: 25px;
      background: #e8f5e9;
      border: 2px solid #27ae60;
      border-radius: 10px;
    }
    .score { font-size: 2em; text-align: center; margin: 20px 0; }
    .correct { color: #27ae60; font-weight: bold; }
    .wrong   { color: #e74c3c; }
    .revealed-correct {
      background: #d4edda;
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 10px;
    }
    .option-row { display: flex; align-items: center; margin: 8px 0; }
  </style>
</head>
<body>

<div class="header">
  <h1>ROYAL WUNDERKIND MODEL SCHOOL</h1>
  <h2>TERM TWO EXAMINATION, 2025/2026 ACADEMIC SESSION</h2>
  <p style="text-align:center; font-size:1.1em;">
    Class: Key Stage 1 (Year 1)<br>
    Subject: CULTURAL AND CREATIVE ART<br>
    Duration: 45 minutes (for this CBT version)
  </p>
  <div class="timer" id="timer">Time remaining: 45:00</div>
</div>

<form id="examForm">
  <!-- Questions will be inserted here by JS -->
</form>

<button id="submitBtn">Submit Exam</button>

<div id="result">
  <h2>Your Result</h2>
  <div class="score" id="scoreText"></div>
  <div id="detailedAnswers"></div>
</div>

<script>
// ────────────────────────────────────────────────
//          CORRECT ANSWERS (used for scoring & reveal)
// ────────────────────────────────────────────────
const correctAnswers = [
  "B", // 1. shapes
  "B", // 2. circle
  "B", // 3. four
  "B", // 4. three
  "A", // 5. colours
  "B", // 6. life
  "B", // 7. inanimate
  "B", // 8. drawing
  "A", // 9. grow
  "B", //10. neat
  "B", //11. paper
  "B", //12. paper
  "B", //13. folding
  "A", //14. glue
  "A", //15. decoration
  "B", //16. short
  "B", //17. remember
  "B", //18. rhyme
  "B", //19. properly
  "B", //20. interesting
  "B", //21. acting
  "B", //22. creative
  "A", //23. entertain
  "B", //24. monkey   (assuming Mr Pablo is monkey – common in such stories)
  "B", //25. Sulan     (assuming Sulan is king – please adjust if different)
  "B", //26. dance
  "B", //27. music
  "B", //28. ceremony
  "B", //29. cheerful
  "B"  //30. together
];

const questions = [
  { q: "1. A pattern is made by repeating ______.", opts: ["A. letters", "B. shapes", "C. words"] },
  { q: "2. Which of these is a basic shape?", opts: ["A. book", "B. circle", "C. chair"] },
  { q: "3. A square has ______ equal sides.", opts: ["A. three", "B. four", "C. five"] },
  { q: "4. A triangle has ______ sides.", opts: ["A. two", "B. three", "C. four"] },
  { q: "5. Patterns look more beautiful when we use ______. ", opts: ["A. colours", "B. noise", "C. dust"] },
  { q: "6. An inanimate object is something that has no ______. ", opts: ["A. colour", "B. life", "C. shape"] },
  { q: "7. A chair is an example of an ______ object.", opts: ["A. animate", "B. inanimate", "C. living"] },
  { q: "8. A pencil is used for ______. ", opts: ["A. cooking", "B. drawing", "C. washing"] },
  { q: "9. A book cannot ______. ", opts: ["A. grow", "B. open", "C. close"] },
  { q: "10. In drawing we should be ______. ", opts: ["A. rough", "B. neat", "C. careless"] },
  { q: "11. Paper craft means making things from ______. ", opts: ["A. wood", "B. paper", "C. metal"] },
  { q: "12. A kite is made from ______. ", opts: ["A. plastic", "B. paper", "C. iron"] },
  { q: "13. A paper fan is made by ______. ", opts: ["A. tearing", "B. folding", "C. burning"] },
  { q: "14. We use ______ to join paper. ", opts: ["A. glue", "B. sand", "C. dust"] },
  { q: "15. Paper crafts can be used for ______. ", opts: ["A. decoration", "B. fighting", "C. cooking"] },
  { q: "16. Rhymes are ______ songs. ", opts: ["A. long", "B. short", "C. difficult"] },
  { q: "17. Rhymes are easy to ______. ", opts: ["A. forget", "B. remember", "C. break"] },
  { q: "18. “Baa Baa Black Sheep” is a ______. ", opts: ["A. story", "B. rhyme", "C. play"] },
  { q: "19. Rhymes help us pronounce words ______. ", opts: ["A. wrongly", "B. properly", "C. slowly"] },
  { q: "20. Rhymes are ______ to sing. ", opts: ["A. boring", "B. interesting", "C. silent"] },
  { q: "21. Role-play means ______ a part in a story. ", opts: ["A. reading", "B. acting", "C. drawing"] },
  { q: "22. Role-play helps us to be ______. ", opts: ["A. lazy", "B. creative", "C. careless"] },
  { q: "23. Stories are told to ______ us. ", opts: ["A. entertain", "B. fight", "C. confuse"] },
  { q: "24. Mr Pablo in the story was a ______. ", opts: ["A. lion", "B. monkey", "C. goat"] },
  { q: "25. The king of the animals was ______. ", opts: ["A. Pablo", "B. Sulan", "C. Thompson"] },
  { q: "26. During ceremonies people ______. ", opts: ["A. sleep", "B. dance", "C. hide"] },
  { q: "27. Drums are used to make ______. ", opts: ["A. noise", "B. music", "C. water"] },
  { q: "28. A wedding is a type of ______. ", opts: ["A. game", "B. ceremony", "C. lesson"] },
  { q: "29. People are usually ______ during ceremonies. ", opts: ["A. sad", "B. cheerful", "C. angry"] },
  { q: "30. Ceremonies bring people ______. ", opts: ["A. apart", "B. together", "C. away"] }
];

// ────────────────────────────────────────────────
//               RENDER QUESTIONS
// ────────────────────────────────────────────────
const form = document.getElementById("examForm");

questions.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `<h3>${item.q}</h3>`;

  item.opts.forEach((opt, i) => {
    const letter = String.fromCharCode(65 + i); // A,B,C,...
    const id = `q${index+1}_${letter}`;
    const row = document.createElement("div");
    row.className = "option-row";
    row.innerHTML = `
      <input type="radio" name="q${index+1}" id="${id}" value="${letter}">
      <label for="${id}">${opt}</label>
    `;
    div.appendChild(row);
  });

  form.appendChild(div);
});

// ────────────────────────────────────────────────
//                  TIMER (45 minutes)
// ────────────────────────────────────────────────
let timeLeft = 45 * 60; // seconds
const timerDisplay = document.getElementById("timer");
let timerInterval;

function updateTimer() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  timerDisplay.textContent = `Time remaining: ${min}:${sec.toString().padStart(2,'0')}`;

  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    timerDisplay.textContent = "Time's up!";
    submitExam(); // auto-submit
  }
  timeLeft--;
}

timerInterval = setInterval(updateTimer, 1000);
updateTimer(); // initial call

// ────────────────────────────────────────────────
//                 SUBMIT & SCORING
// ────────────────────────────────────────────────
document.getElementById("submitBtn").addEventListener("click", submitExam);

function submitExam() {
  clearInterval(timerInterval);
  document.getElementById("submitBtn").disabled = true;

  let score = 0;
  let html = "";

  questions.forEach((_, i) => {
    const qNum = i + 1;
    const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
    const userAns = selected ? selected.value : null;
    const correct = correctAnswers[i];

    let status = "";
    let mark = "";

    if (userAns === correct) {
      score++;
      mark = `<span class="correct">✅ Correct</span>`;
    } else {
      mark = `<span class="wrong">❌ Wrong</span>`;
    }

    // Show correct answer always after submission
    const correctLetter = correct;
    const correctText = questions[i].opts[correct.charCodeAt(0) - 65].substring(3); // remove "A. "

    html += `
      <div class="question">
        <h3>${questions[i].q}</h3>
        <p>Your answer: ${userAns || "—"} ${mark}</p>
        <p>Correct answer: <span class="revealed-correct">${correctLetter}. ${correctText}</span></p>
      </div>
    `;
  });

  const percent = ((score / 30) * 100).toFixed(1);

  document.getElementById("scoreText").innerHTML =
    `You scored <strong>${score} / 30</strong> (${percent}%)`;

  document.getElementById("detailedAnswers").innerHTML = html;
  document.getElementById("result").style.display = "block";

  // Scroll to result
  document.getElementById("result").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics CBT - Royal Wunderkind Model School</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #header-info { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        #header-info h1 { margin: 5px 0; font-size: 1.5rem; color: var(--primary-color); }
        #header-info h2 { margin: 5px 0; font-size: 1.1rem; color: var(--accent-color); }

        .hidden { display: none; }
        
        #status-bar { display: flex; justify-content: space-between; align-items: center; background: #ecf0f1; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        #timer { color: var(--danger-color); font-size: 1.2rem; }

        .question-card { display: none; }
        .question-card.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-label { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: block; }
        .option-label:hover { background-color: #f0f7ff; border-color: var(--accent-color); }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        .text-input { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: var(--accent-color); color: white; }
        .btn-submit { background: var(--success-color); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #result-screen { text-align: center; }
        .score-box { font-size: 2rem; color: var(--accent-color); margin: 20px 0; }
        .review-item { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        .correct-ans-tag { color: var(--success-color); font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <div id="header-info">
            <h1>ROYAL WUNDERKIND MODEL SCHOOL</h1>
            <h2>TERM TWO EXAMINATION | MATHEMATICS</h2>
        </div>
        <div style="text-align: center;">
            <p>Enter your full name to start the 45-minute examination.</p>
            <input type="text" id="candidate-name" class="text-input" style="max-width: 400px; margin-bottom: 20px;" placeholder="Full Name">
            <br>
            <button class="btn-next" onclick="startExam()">Start Examination</button>
        </div>
    </div>

    <div id="exam-screen" class="hidden">
        <div id="status-bar">
            <span id="display-name">Candidate: </span>
            <span id="timer">Time Remaining: 45:00</span>
        </div>

        <div id="questions-container">
            </div>

        <div class="nav-controls">
            <button id="prev-btn" class="btn-prev" onclick="move(-1)">Previous</button>
            <button id="next-btn" class="btn-next" onclick="move(1)">Next</button>
            <button id="submit-btn" class="btn-submit hidden" onclick="finishExam()">Submit Examination</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Examination Completed</h1>
        <div id="display-final-name" style="font-weight: bold;"></div>
        <div class="score-box" id="score-display"></div>
        <div id="review-area"></div>
        <button class="btn-next" onclick="location.reload()" style="margin-top: 20px;">Exit Portal</button>
    </div>
</div>

<script>
    const questions = [
        { q: "₦5 + ₦5 = ______", type: "mcq", options: ["₦8", "₦10", "₦12"], correct: "₦10" },
        { q: "₦10 + ₦5 = ______", type: "mcq", options: ["₦12", "₦15", "₦20"], correct: "₦15" },
        { q: "₦20 − ₦10 = ______", type: "mcq", options: ["₦5", "₦10", "₦15"], correct: "₦10" },
        { q: "₦50 + ₦20 = ______", type: "mcq", options: ["₦60", "₦70", "₦80"], correct: "₦70" },
        { q: "₦100 − ₦50 = ______", type: "mcq", options: ["₦40", "₦50", "₦60"], correct: "₦50" },
        { q: "How many kobo make one naira?", type: "mcq", options: ["10", "50", "100"], correct: "100" },
        { q: "7 + 5 = ______", type: "mcq", options: ["11", "12", "13"], correct: "12" },
        { q: "9 + 6 = ______", type: "mcq", options: ["14", "15", "16"], correct: "15" },
        { q: "10 + 8 = ______", type: "mcq", options: ["16", "18", "20"], correct: "18" },
        { q: "12 + 7 = ______", type: "mcq", options: ["18", "19", "20"], correct: "19" },
        { q: "15 + 10 = ______", type: "mcq", options: ["20", "25", "30"], correct: "25" },
        { q: "20 + 15 = ______", type: "mcq", options: ["30", "35", "40"], correct: "35" },
        { q: "2 × 4 = ______", type: "mcq", options: ["6", "8", "10"], correct: "8" },
        { q: "2 × 6 = ______", type: "mcq", options: ["10", "12", "14"], correct: "12" },
        { q: "3 × 3 = ______", type: "mcq", options: ["6", "9", "12"], correct: "9" },
        { q: "3 × 5 = ______", type: "mcq", options: ["12", "15", "18"], correct: "15" },
        { q: "4 × 4 = ______", type: "mcq", options: ["12", "14", "16"], correct: "16" },
        { q: "4 × 5 = ______", type: "mcq", options: ["18", "20", "22"], correct: "20" },
        { q: "5 × 3 = ______", type: "mcq", options: ["12", "15", "18"], correct: "15" },
        { q: "5 × 4 = ______", type: "mcq", options: ["18", "20", "22"], correct: "20" },
        { q: "10 ÷ 2 = ______", type: "mcq", options: ["3", "5", "7"], correct: "5" },
        { q: "12 ÷ 3 = ______", type: "mcq", options: ["3", "4", "5"], correct: "4" },
        { q: "20 ÷ 5 = ______", type: "mcq", options: ["3", "4", "5"], correct: "4" },
        { q: "How many days are in a week?", type: "mcq", options: ["6", "7", "8"], correct: "7" },
        { q: "Which day comes after Monday?", type: "mcq", options: ["Tuesday", "Wednesday", "Thursday"], correct: "Tuesday" },
        { q: "Which day comes before Friday?", type: "mcq", options: ["Wednesday", "Thursday", "Saturday"], correct: "Thursday" },
        { q: "How many months are in a year?", type: "mcq", options: ["10", "11", "12"], correct: "12" },
        { q: "Which month is the first month of the year?", type: "mcq", options: ["January", "March", "May"], correct: "January" },
        { q: "Which month has 28 or 29 days?", type: "mcq", options: ["February", "April", "June"], correct: "February" },
        { q: "5 + ___ = 10", type: "mcq", options: ["4", "5", "6"], correct: "5" },
        { q: "½ of 10 = ______", type: "mcq", options: ["4", "5", "6"], correct: "5" },
        { q: "½ of 20 = ______", type: "mcq", options: ["8", "10", "12"], correct: "10" },
        { q: "⅓ of 9 = ______", type: "mcq", options: ["2", "3", "4"], correct: "3" },
        { q: "2/3 of 12 = ______", type: "mcq", options: ["6", "8", "10"], correct: "8" },
        { q: "¼ of 8 = ______", type: "mcq", options: ["1", "2", "3"], correct: "2" },
        { q: "Write in figures: Five", type: "mcq", options: ["4", "5", "6"], correct: "5" },
        { q: "Write in figures: Ten", type: "mcq", options: ["8", "10", "12"], correct: "10" },
        { q: "Write in figures: Fifteen", type: "mcq", options: ["13", "15", "17"], correct: "15" },
        { q: "Write in figures: Twenty", type: "mcq", options: ["18", "20", "22"], correct: "20" },
        { q: "Write in figures: Thirty", type: "mcq", options: ["28", "30", "32"], correct: "30" }
    ];

    let currentStep = 0;
    let timeRemaining = 45 * 60; // 45 Minutes
    let timerInterval;
    let answers = {};

    function startExam() {
        const name = document.getElementById('candidate-name').value.trim();
        if (!name) { alert("Please enter your name to proceed."); return; }
        
        document.getElementById('display-name').innerText = "Candidate: " + name;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('exam-screen').classList.remove('hidden');
        
        buildQuiz();
        startTimer();
    }

    function buildQuiz() {
        const container = document.getElementById('questions-container');
        questions.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = `question-card ${idx === 0 ? 'active' : ''}`;
            card.id = `quest-${idx}`;
            
            let html = `<div class="question-text"><strong>Question ${idx + 1}:</strong> ${item.q}</div>`;
            
            if (item.type === "mcq") {
                html += `<div class="options-container">`;
                item.options.forEach(opt => {
                    html += `
                        <label class="option-label">
                            <input type="radio" name="q${idx}" value="${opt}" onclick="recordAnswer(${idx}, '${opt}')">
                            ${opt}
                        </label>`;
                });
                html += `</div>`;
            }
            
            card.innerHTML = html;
            container.appendChild(card);
        });
        updateNav();
    }

    function recordAnswer(idx, val) {
        answers[idx] = val;
    }

    function move(dir) {
        document.getElementById(`quest-${currentStep}`).classList.remove('active');
        currentStep += dir;
        document.getElementById(`quest-${currentStep}`).classList.add('active');
        updateNav();
    }

    function updateNav() {
        document.getElementById('prev-btn').disabled = (currentStep === 0);
        const isLast = (currentStep === questions.length - 1);
        document.getElementById('next-btn').classList.toggle('hidden', isLast);
        document.getElementById('submit-btn').classList.toggle('hidden', !isLast);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeRemaining--;
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById('timer').innerText = `Time Remaining: ${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeRemaining <= 0) finishExam();
        }, 1000);
    }

    function finishExam() {
        clearInterval(timerInterval);
        let score = 0;
        let reviewHtml = '';

        questions.forEach((item, idx) => {
            const userSelection = answers[idx] || "No Answer";
            const isCorrect = userSelection === item.correct;
            if (isCorrect) score++;

            reviewHtml += `
                <div class="review-item">
                    <strong>Q${idx+1}:</strong> ${item.q}<br>
                    <span>Your Answer: ${userSelection}</span>
                    <span class="correct-ans-tag">Correct Answer: ${item.correct}</span>
                </div>`;
        });

        document.getElementById('exam-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-final-name').innerText = "Result for: " + document.getElementById('candidate-name').value;
        document.getElementById('score-display').innerText = `Total Score: ${score} / ${questions.length}`;
        document.getElementById('review-area').innerHTML = "<h3>Review Answers:</h3>" + reviewHtml;
    }
</script>

</body>
</html>
